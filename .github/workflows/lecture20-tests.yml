name: Lecture20 Tests

on:
  pull_request:
    paths:
      - "Lectures/Lecture20/**"
      - "Lectures/pom.xml"
      - ".github/workflows/lecture20-tests.yml"

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run Maven clean install
        run: |
          cd Lectures/Lecture20
          mvn -B clean install -DskipTests

  test:
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run Maven test
        run: |
          cd Lectures/Lecture20
          mvn -B test

