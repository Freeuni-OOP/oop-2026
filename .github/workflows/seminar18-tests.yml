name: Seminar 18 unit tests

on:
  pull_request:
    paths:
      - "Seminars/Giorgi/18/**"

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run Maven clean install
        run: |
          cd Seminars/Giorgi/18
          mvn -B clean install -DskipTests

  test:
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run Maven test
        run: |
          cd Seminars/Giorgi/18
          mvn -B test
